<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Signature · Franco Ricci · BlitzAI Solutions</title>
<style>
  /* Fallback preview styling only. Email clients strip <style> — every rule that matters is inlined below. */
  body { margin: 0; padding: 32px; background: #F3F4F7; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; }
  /* Mobile: some clients (Apple Mail, iOS Mail, Gmail webmail) respect this to stack the two columns */
  @media only screen and (max-width: 480px) {
    table.sig, table.sig td { width: 100% !important; }
    td.sig-logo { padding: 0 0 16px 0 !important; }
    td.sig-divider { display: none !important; height: 0 !important; width: 0 !important; }
    td.sig-info { padding: 0 !important; }
    img.sig-logo-img { width: 60px !important; height: 60px !important; }
  }
</style>
</head>
<body>

<!--
============================================================
  BlitzAI Solutions · Email Signature · Franco Ricci
  Table-based, inline-styled for Gmail / Outlook / Apple Mail.
  Colors:  Navy #0A1428  ·  Blue #2B7FFF  ·  Muted #626B78
  Font:    Inter (fallback: -apple-system, Segoe UI, Arial)
============================================================
Copy from HERE to the end of the sig table and paste into your
mail client's signature editor. Do NOT copy the <style> block or
this comment.
-->

<table role="presentation" class="sig" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; background: transparent; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; color: #0A1428; max-width: 520px; width: 100%;">
  <tr>
    <!-- Logo column -->
    <td class="sig-logo" valign="top" style="padding: 0 22px 0 0; vertical-align: top; width: 88px;">
      <img class="sig-logo-img" src="https://theblitzaisolutions.com/assets/badge.png" alt="BlitzAI Solutions" width="80" height="80" style="display: block; width: 80px; height: 80px; border: 0; outline: none; text-decoration: none; -ms-interpolation-mode: bicubic;">
    </td>

    <!-- Divider column -->
    <td class="sig-divider" valign="top" style="padding: 4px 22px 4px 0; vertical-align: top; width: 1px;">
      <div style="width: 1px; height: 96px; background: #2B7FFF; line-height: 1px; font-size: 1px;">&nbsp;</div>
    </td>

    <!-- Info column -->
    <td class="sig-info" valign="top" style="vertical-align: top; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;">

      <!-- Name -->
      <div style="font-size: 17px; font-weight: 700; color: #0A1428; letter-spacing: -0.01em; line-height: 1.2; margin: 0 0 4px 0;">
        Franco Ricci
      </div>

      <!-- Title · Company -->
      <div style="font-size: 13px; font-weight: 500; color: #2B7FFF; line-height: 1.4; margin: 0 0 10px 0;">
        Chief Executive &nbsp;·&nbsp; <span style="color: #626B78; font-weight: 400;">BlitzAI Solutions</span>
      </div>

      <!-- Contact rows -->
      <div style="font-size: 13px; color: #0A1428; line-height: 1.7; margin: 0 0 12px 0;">
        <a href="mailto:franco@theblitzaisolutions.com" style="color: #0A1428; text-decoration: none;">franco@theblitzaisolutions.com</a><br>
        <a href="https://theblitzaisolutions.com" style="color: #2B7FFF; text-decoration: none; font-weight: 500;">theblitzaisolutions.com</a>
      </div>

      <!-- Social + CTA row -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; margin: 0 0 10px 0;">
        <tr>
          <!-- LinkedIn icon -->
          <td valign="middle" style="padding: 0 10px 0 0; vertical-align: middle;">
            <a href="https://www.linkedin.com/in/franco-ricci-4b256828b/" style="text-decoration: none;">
              <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons@11.14.0/icons/linkedin.svg" alt="LinkedIn" width="16" height="16" style="display: block; width: 16px; height: 16px; border: 0;">
            </a>
          </td>

          <!-- Spacer -->
          <td valign="middle" style="padding: 0 12px 0 0; vertical-align: middle; width: 1px;">
            <div style="width: 1px; height: 18px; background: rgba(10,20,40,0.12); line-height: 1px; font-size: 1px;">&nbsp;</div>
          </td>

          <!-- Book a Call button (bulletproof pattern) -->
          <td valign="middle" style="vertical-align: middle;">
            <!--[if mso]>
            <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://api.leadconnectorhq.com/widget/booking/qiSWHLotaN6lzZMwY0w1" style="height: 32px; v-text-anchor: middle; width: 118px;" arcsize="20%" stroke="f" fillcolor="#2B7FFF">
              <w:anchorlock/>
              <center style="color:#FFFFFF; font-family: Arial, sans-serif; font-size: 12px; font-weight: 600;">Book a Call &#x2192;</center>
            </v:roundrect>
            <![endif]-->
            <!--[if !mso]><!-- -->
            <a href="https://api.leadconnectorhq.com/widget/booking/qiSWHLotaN6lzZMwY0w1" style="display: inline-block; background: #2B7FFF; color: #FFFFFF; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.01em; text-decoration: none; padding: 9px 16px; border-radius: 6px; line-height: 1;">
              Book a Call &nbsp;&rarr;
            </a>
            <!--<![endif]-->
          </td>
        </tr>
      </table>

      <!-- Tagline -->
      <div style="font-size: 11px; font-weight: 500; color: #626B78; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.4; margin: 6px 0 0 0;">
        The Growth System Your Revenue Runs On
      </div>

    </td>
  </tr>
</table>

<!-- END SIGNATURE -->

</body>
</html>
